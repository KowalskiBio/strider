# git-cliff configuration — generates CHANGELOG.md from Conventional Commits.
# Regenerate with:  uvx git-cliff -o CHANGELOG.md
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to strider-dna are documented here.
This file is generated from the git history by [git-cliff](https://git-cliff.org).
The format follows [Keep a Changelog](https://keepachangelog.com) and the project
uses [Semantic Versioning](https://semver.org).\n
"""
# Tera template for each release section.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true   # drop commits that aren't Conventional Commits
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"

# Map commit-type prefixes to changelog sections. Order here = order in the file.
commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^doc",      group = "Documentation" },
  { message = "^test",     group = "Testing" },
  { message = "^revert",   group = "Reverted" },
  # Housekeeping that shouldn't clutter the changelog:
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore",    skip = true },
  { message = "^build",    skip = true },
  { message = "^ci",       skip = true },
  { message = "^style",    skip = true },
  { body = ".*security",   group = "Security" },
]
