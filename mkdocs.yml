site_name: strider-dna
site_url: https://emiliovenegas.github.io/strider
repo_url: https://github.com/EmilioVenegas/strider
repo_name: EmilioVenegas/strider

theme:
  name: material
  palette:
    primary: teal
    accent: cyan
  features:
    - navigation.sections
    - navigation.top

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

nav:
  - Home: index.md
  - API Reference: api.md
